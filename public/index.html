<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunex Stealth Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@500;600&display=swap" rel="stylesheet">
    
    <script src="baremux/index.js" defer></script>
    <script src="epoxy/index.js" defer></script>
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>

    <style>
        :root {
            --bg0: #0b0e14;
            --brand1: #8b5cf6;
            --brand3: #0ea5e9;
            --stroke: rgba(255,255,255,.08);
            --txt: rgba(255,255,255,.92);
            --muted: rgba(255,255,255,.60);
        }
        body {
            /* Transparent background so it blends perfectly into your Lunex iframe */
            background-color: transparent; 
            color: var(--txt);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .engine-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            background: rgba(15, 20, 35, 0.4);
            border: 1px solid var(--stroke);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0,0,0,.60);
            backdrop-filter: blur(16px);
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--brand1), var(--brand3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 24px;
        }
        #uv-form {
            display: flex;
            width: 100%;
            position: relative;
        }
        #uv-search-engine {
            display: none; 
        }
        #uv-address {
            width: 100%;
            padding: 16px 24px;
            border-radius: 999px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--stroke);
            color: var(--txt);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        #uv-address:focus {
            border-color: var(--brand1);
            box-shadow: 0 0 0 4px rgba(139,92,246,0.2);
            background: rgba(0,0,0,0.6);
        }
        .desc {
            margin-top: 16px;
            font-size: 13px;
            color: var(--muted);
        }
        .error {
            color: #ef4444;
            margin-top: 10px;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="engine-container">
        <div class="logo">Stealth Engine</div>
        <div class="subtitle">Unrestricted web access. Routed securely.</div>
        
        <form id="uv-form">
            <input id="uv-search-engine" value="https://www.google.com/search?q=%s" type="hidden"/> 
            <input id="uv-address" type="text" placeholder="Search Google or type a URL (e.g., discord.com)"/>
        </form>
        
        <p class="desc" id="uv-error"></p>
        <pre class="error" id="uv-error-code"></pre>
    </div>
</body>
</html>
