<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunex Stealth Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@500;600&display=swap" rel="stylesheet">
    
    <script src="baremux/index.js" defer></script>
    <script src="epoxy/index.js" defer></script>
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>

    <style>
        :root {
            --bg0: #0b0e14;
            --brand1: #8b5cf6;
            --brand3: #0ea5e9;
            --stroke: rgba(255,255,255,.08);
            --txt: rgba(255,255,255,.92);
            --muted: rgba(255,255,255,.60);
        }
        body {
            /* Transparent background so it blends perfectly into your Lunex iframe */
            background-color: transparent; 
            color: var(--txt);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .engine-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 32px 20px;
            background: rgba(15, 20, 35, 0.4);
            border: 1px solid var(--stroke);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0,0,0,.60);
            backdrop-filter: blur(16px);
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--brand1), var(--brand3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 24px;
            font-weight: 500;
        }
        #uv-form {
            display: flex;
            width: 100%;
            position: relative;
        }
        #uv-search-engine { display: none; }
        #uv-address {
            width: 100%;
            padding: 18px 24px;
            border-radius: 999px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--stroke);
            color: var(--txt);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }
        #uv-address:focus {
            border-color: var(--brand1);
            box-shadow: 0 0 0 4px rgba(139,92,246,0.2);
            background: rgba(0,0,0,0.6);
        }
        
        /* Loading Ring */
        .loading-ring {
            display: none; /* Hidden by default */
            width: 24px;
            height: 24px;
            border: 3px solid rgba(139, 92, 246, 0.3);
            border-radius: 50%;
            border-top-color: var(--brand1);
            animation: spin 1s ease-in-out infinite;
            margin-top: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .desc { margin-top: 16px; font-size: 13px; color: var(--brand1); font-weight: 600; display: none; }
        .error { color: #ef4444; margin-top: 10px; font-size: 13px; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="engine-container">
        <div class="logo">Lunex Engine</div>
        <div class="subtitle">Secure. Invisible. Unrestricted.</div>
        
        <form id="uv-form">
            <input id="uv-search-engine" value="https://www.google.com/search?q=%s" type="hidden"/> 
            <input id="uv-address" type="text" placeholder="Search the web or type a URL (e.g., discord.com)"/>
        </form>
        
        <div class="loading-ring" id="loading"></div>
        <p class="desc" id="uv-error"></p>
        <pre class="error" id="uv-error-code"></pre>
    </div>
</body>
</html>
