<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunex Stealth Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="baremux/index.js" defer></script>
    <script src="epoxy/index.js" defer></script>
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>

    <style>
        :root {
            --bg0: #03050a; 
            --bg1: #0a0f1d;
            --brand1: #8b5cf6; 
            --brand2: #10b981; 
            --brand3: #0ea5e9;
            --stroke: rgba(255,255,255,.08);
            --txt: rgba(255,255,255,.92);
            --muted: rgba(255,255,255,.60);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--txt);
            /* Exact Lunex Background */
            background: radial-gradient(1200px 600px at 15% 5%, rgba(139, 92, 246, 0.25), transparent 60%),
                        radial-gradient(1200px 600px at 85% 15%, rgba(14, 165, 233, 0.20), transparent 60%),
                        radial-gradient(1200px 800px at 70% 90%, rgba(16, 185, 129, 0.12), transparent 65%),
                        linear-gradient(180deg, var(--bg0), var(--bg1));
            background-color: var(--bg0);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        #particles-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .engine-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 600px;
            padding: 40px 30px;
            background: rgba(15, 20, 35, 0.6);
            border: 1px solid var(--stroke);
            border-radius: 28px;
            box-shadow: 0 30px 80px rgba(0,0,0,.70);
            backdrop-filter: blur(20px);
            /* Smooth floating animation */
            animation: floatY 6s ease-in-out infinite, fadeIn 0.8s ease-out forwards;
        }

        @keyframes floatY {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--brand1), var(--brand3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        #uv-form {
            display: flex;
            width: 100%;
            position: relative;
        }
        #uv-search-engine { display: none; }
        
        #uv-address {
            width: 100%;
            padding: 18px 24px;
            border-radius: 999px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--stroke);
            color: var(--txt);
            font-size: 16px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-align: center;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }
        #uv-address:focus {
            border-color: var(--brand1);
            box-shadow: 0 0 0 4px rgba(139,92,246,0.25), inset 0 2px 10px rgba(0,0,0,0.4);
            background: rgba(0,0,0,0.7);
            transform: scale(1.02);
        }
        
        .loading-ring {
            display: none;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-radius: 50%;
            border-top-color: var(--brand1);
            animation: spin 0.8s linear infinite;
            margin: 24px auto 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error { color: #ef4444; margin-top: 16px; font-size: 14px; white-space: pre-wrap; word-wrap: break-word; font-family: monospace; }
        #uv-error { color: #fca5a5; font-weight: 600; margin-bottom: 4px; display: none; }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="engine-container">
        <div class="logo">Lunex Engine</div>
        <div class="subtitle">Secure. Invisible. Unrestricted.</div>
        
        <form id="uv-form">
            <input id="uv-search-engine" value="https://www.google.com/search?q=%s" type="hidden"/> 
            <input id="uv-address" type="text" placeholder="Search the web or type a URL (e.g., discord.com)"/>
        </form>
        
        <div class="loading-ring" id="loading"></div>
        <p id="uv-error"></p>
        <pre class="error" id="uv-error-code"></pre>
    </div>

    <script>
        // Lunex Particle Engine
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initParticles() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    r: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.5 + 0.1,
                    angle: Math.random() * Math.PI * 2,
                    alpha: Math.random() * 0.5 + 0.1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.y -= p.speed; 
                p.x += Math.sin(p.angle) * 0.3; 
                p.angle += 0.01;
                if (p.y < -10) { p.y = height + 10; p.x = Math.random() * width; }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(139, 92, 246, ${p.alpha})`; 
                ctx.shadowBlur = 10; 
                ctx.shadowColor = "rgba(139, 92, 246, 0.8)";
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initParticles);
        initParticles(); drawParticles();
    </script>
</body>
</html>
