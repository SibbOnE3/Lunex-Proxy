<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunex Stealth Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>

    <style>
        :root {
            --bg0: #03050a; 
            --brand1: #8b5cf6; 
            --brand3: #0ea5e9;
            --stroke: rgba(255,255,255,.08);
            --txt: rgba(255,255,255,.92);
            --muted: rgba(255,255,255,.60);
        }
        body {
            margin: 0; height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--txt);
            background: radial-gradient(circle at 50% 50%, rgba(139,92,246,0.15), var(--bg0));
            background-color: var(--bg0);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        #particles-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .engine-container {
            position: relative; z-index: 10; text-align: center;
            width: 90%; max-width: 550px; padding: 40px;
            background: rgba(15, 20, 35, 0.7);
            border: 1px solid var(--stroke);
            border-radius: 32px; backdrop-filter: blur(20px);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .logo {
            font-family: 'Space Grotesk', sans-serif; font-size: 42px; font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--brand1));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        #uv-address {
            width: 100%; padding: 18px 25px; border-radius: 99px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--stroke);
            color: #fff; font-size: 16px; text-align: center; outline: none;
            transition: 0.3s;
        }
        #uv-address:focus { border-color: var(--brand1); box-shadow: 0 0 20px rgba(139,92,246,0.3); }
        .loading-ring {
            display: none; width: 30px; height: 30px; border: 3px solid rgba(139,92,246,0.2);
            border-radius: 50%; border-top-color: var(--brand1);
            animation: spin 1s linear infinite; margin: 20px auto 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="engine-container">
        <div class="logo">Lunex Engine</div>
        <p style="color:var(--muted); margin-bottom: 30px;">Secure. Invisible. Unrestricted.</p>
        <form id="uv-form">
            <input id="uv-address" type="text" placeholder="Search Google or enter a URL...">
        </form>
        <div class="loading-ring" id="loading"></div>
    </div>

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = Array.from({length: 40}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                r: Math.random() * 2, s: Math.random() * 0.5 + 0.1
            }));
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.s; if(p.y < 0) p.y = canvas.height;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = "rgba(139,92,246,0.4)"; ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        window.onresize = init; init(); animate();
    </script>
</body>
</html>
